<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>スライム討伐戦</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 3Dシーンがここに全画面で入る -->
<div id="sceneContainer"></div>

<!-- HUD：画面に重なるオーバーレイUI -->
<div id="hud">
  <!-- ボスHP -->
  <div id="bossHpArea">
    <div id="hpText">古龍スライム・ギガンテス　HP 5000 / 5000</div>
    <div class="hp-bar-outer"><div class="hp-bar-inner" id="hpBarInner"></div></div>
  </div>

  <!-- 必殺技ゲージ -->
  <div id="gaugeArea">
    <div id="gaugeLabel">必殺技ゲージ: 0%</div>
    <div class="gauge-outer"><div class="gauge-inner" id="gaugeInner"></div></div>
  </div>

  <!-- ステータス -->
  <div id="statsArea">
    <span>ダメージ: <b id="totalDamage">0</b></span>
    <span>攻撃: <b id="attackCount">0</b>回</span>
  </div>

  <!-- ステータスライン -->
  <div id="statusLine"></div>

  <!-- 右下：攻撃ボタン群 -->
  <div id="actionButtons">
    <button class="special-btn" id="specialBtn">✨ 必殺技 ✨</button>
    <button class="attack-btn" id="attackBtn">⚔️ こうげき！</button>
  </div>

  <!-- 左下：十字ボタン -->
  <div class="dpad">
    <button class="dpad-btn dpad-up"    data-dir="up">▲</button>
    <button class="dpad-btn dpad-left"  data-dir="left">◀</button>
    <div class="dpad-center"></div>
    <button class="dpad-btn dpad-right" data-dir="right">▶</button>
    <button class="dpad-btn dpad-down"  data-dir="down">▼</button>
  </div>

  <!-- リセット -->
  <button class="reset-btn" id="resetBtn">↺</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="config.js"></script>
<script src="game.js"></script>
</body>
</html>
